<!-- ============================================================
     html/hero.html — Hero Panel Section
     Loaded dynamically by js/loader.js into #section-hero.

     To edit the hero content, edit this file only.
     Styles live in css/hero.css.
     ============================================================ -->
<main class="hero-panel" id="hero">

  <div class="hero-inner">

    <!-- Issue tag -->
    <div class="issue-tag">Issue #404 &bull; NOT LOST!</div>

    <!-- Big headline -->
    <h1 class="hero-title">
      <span class="title-line-1">ALOK</span>
      <span class="title-line-2">DAS</span>
    </h1>

    <!-- Typewriter speech bubble -->
    <div class="speech-bubble" id="speech-bubble" aria-label="Greeting speech bubble">
      <span id="typewriter-text"></span><span class="cursor" aria-hidden="true">|</span>
    </div>

    <!-- Sub-headline pill -->
    <p class="hero-sub">App Developer &bull; Creator &bull; Total Nerd 🤓</p>

    <!-- Countdown redirect box -->
    <div class="redirect-box" id="redirect-box" role="status" aria-live="polite">
      <p class="redirect-label">🚀 Launching full portfolio in...</p>

      <div class="countdown-display" id="countdown-number" aria-label="Countdown">10</div>

      <div class="progress-track"
           role="progressbar"
           aria-valuemin="0"
           aria-valuemax="10"
           aria-valuenow="0"
           aria-label="Redirect progress">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <a href="https://me.alokdasofficial.in"
         class="cta-btn"
         id="cta-btn"
         aria-label="Go to portfolio now">
        <span>⚡ TAKE ME THERE NOW!</span>
      </a>
    </div>

    <!-- Resume shortcut -->
    <a href="/resume" class="resume-btn" id="resume-btn">
      📄 View My Resume
    </a>

  </div>
</main>
