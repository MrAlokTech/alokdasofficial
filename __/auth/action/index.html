<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Action | Alok Das</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/base.css" />

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>
      body {
        background: var(--purple);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 1rem;
      }
      .auth-card {
        background: var(--cream);
        border: var(--border-thick);
        border-radius: var(--radius);
        box-shadow: var(--shadow-big);
        padding: 2.5rem 2rem;
        text-align: center;
        max-width: 450px;
        width: 100%;
      }
      .auth-title {
        font-family: var(--font-comic);
        font-size: 2.5rem;
        color: var(--yellow);
        -webkit-text-stroke: 1px var(--ink);
        text-shadow: 3px 3px 0 var(--pink);
        letter-spacing: 2px;
        margin-bottom: 0.5rem;
      }
      .auth-msg {
        font-size: 1.1rem;
        color: var(--ink);
        font-weight: 700;
        margin-bottom: 1.5rem;
        line-height: 1.5;
      }

      /* Dynamic Form Styling */
      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        text-align: left;
      }
      .form-label {
        font-family: var(--font-body);
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--ink);
        letter-spacing: 1px;
      }
      .form-input {
        background: var(--white);
        border: var(--border-thin);
        border-radius: 8px;
        padding: 0.65rem 0.9rem;
        font-family: var(--font-body);
        font-size: 1rem;
        color: var(--ink);
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .form-input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(0, 194, 255, 0.2);
      }
      .auth-btn {
        background: var(--yellow);
        color: var(--ink);
        font-family: var(--font-comic);
        font-size: 1.2rem;
        letter-spacing: 2px;
        padding: 0.75rem;
        border: var(--border-thin);
        border-radius: var(--radius);
        box-shadow: var(--shadow-pop);
        cursor: pointer;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
        margin-top: 0.5rem;
      }
      .auth-btn:hover {
        transform: translate(-2px, -2px);
        box-shadow: 8px 8px 0 var(--pink);
      }
      .auth-btn:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--pink);
      }
      .success-text {
        color: #0d3b1e;
      }
      .error-text {
        color: var(--pink);
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <h1 class="auth-title" id="auth-title">ZAP! ⚡</h1>
      <p class="auth-msg" id="status-message">Verifying your link...</p>

      <div id="auth-forms"></div>
    </div>

    <script>
      // 1. Initialize Firebase (REPLACE WITH YOUR APP'S CONFIG)
      const firebaseConfig = {
        apiKey: "AIzaSyAaotynXqso2-gviIfaDfnYpWpZ_D4KPVc",
        authDomain: "alokdasofficial-69f96.firebaseapp.com",
        projectId: "alokdasofficial",
        storageBucket: "alokdasofficial.firebasestorage.app",
        messagingSenderId: "315463239297",
        appId: "1:315463239297:web:930a164891d386583f2f80",
        measurementId: "G-XMBQM46W16",
      };

      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const auth = firebase.auth();

      // 2. Grab UI Elements
      const titleEl = document.getElementById("auth-title");
      const statusEl = document.getElementById("status-message");
      const formsContainer = document.getElementById("auth-forms");

      // 3. Parse URL Parameters
      const urlParams = new URLSearchParams(window.location.search);
      const mode = urlParams.get("mode");
      const oobCode = urlParams.get("oobCode");

      // 4. Handle the specific modes
      if (!mode || !oobCode) {
        titleEl.textContent = "OOPS! 🤔";
        statusEl.textContent =
          "This link is invalid or missing information. Please request a new link from the app.";
        statusEl.className = "auth-msg error-text";
      } else {
        switch (mode) {
          // --- EMAIL VERIFICATION ---
          case "verifyEmail":
            titleEl.textContent = "VERIFIED! ✅";
            statusEl.textContent = "Verifying your email address...";

            auth
              .applyActionCode(oobCode)
              .then(() => {
                statusEl.textContent =
                  "Success! Your email address has been verified. You can now return to the app and sign in.";
                statusEl.className = "auth-msg success-text";
              })
              .catch((error) => {
                titleEl.textContent = "ERROR ⚠️";
                statusEl.textContent =
                  "We couldn't verify your email. The link may have expired or already been used. (" +
                  error.message +
                  ")";
                statusEl.className = "auth-msg error-text";
              });
            break;

          // --- PASSWORD RESET ---
          case "resetPassword":
            titleEl.textContent = "NEW PASSWORD 🔐";
            statusEl.textContent = "Please enter your new password below.";

            // Verify the code is valid first
            auth
              .verifyPasswordResetCode(oobCode)
              .then((email) => {
                // Create the form
                formsContainer.innerHTML = `
              <form id="reset-form" class="auth-form">
                <p style="font-size: 0.85rem; color: #666; margin: 0;">Updating password for: <strong>${email}</strong></p>
                
                <label class="form-label" for="new-password">NEW PASSWORD</label>
                <input class="form-input" type="password" id="new-password" required minlength="6" placeholder="At least 6 characters">
                
                <button type="submit" class="auth-btn" id="submit-btn">RESET PASSWORD</button>
              </form>
            `;

                // Handle form submission
                document
                  .getElementById("reset-form")
                  .addEventListener("submit", (e) => {
                    e.preventDefault();
                    const newPassword =
                      document.getElementById("new-password").value;
                    const btn = document.getElementById("submit-btn");

                    btn.textContent = "UPDATING...";
                    btn.disabled = true;

                    auth
                      .confirmPasswordReset(oobCode, newPassword)
                      .then(() => {
                        formsContainer.innerHTML = "";
                        statusEl.textContent =
                          "Awesome! Your password has been reset successfully. You can now sign in with your new password.";
                        statusEl.className = "auth-msg success-text";
                      })
                      .catch((error) => {
                        btn.textContent = "RESET PASSWORD";
                        btn.disabled = false;
                        alert("Error resetting password: " + error.message);
                      });
                  });
              })
              .catch((error) => {
                titleEl.textContent = "EXPIRED ⏳";
                statusEl.textContent =
                  "This password reset link is invalid or has expired. Please request a new one.";
                statusEl.className = "auth-msg error-text";
              });
            break;

          // --- RECOVER EMAIL (Revert an unauthorized email change) ---
          case "recoverEmail":
            titleEl.textContent = "RECOVER ACCOUNT 🛡️";
            statusEl.textContent = "Restoring your previous email address...";

            let restoredEmail = null;
            auth
              .checkActionCode(oobCode)
              .then((info) => {
                restoredEmail = info.data.email;
                return auth.applyActionCode(oobCode);
              })
              .then(() => {
                statusEl.textContent = `Success! Your email has been restored to ${restoredEmail}. If you didn't authorize this change, please reset your password immediately.`;
                statusEl.className = "auth-msg success-text";

                // Optionally add a button to trigger a password reset email
                formsContainer.innerHTML = `
              <button class="auth-btn" id="send-reset-btn" style="width: 100%;">SEND PASSWORD RESET</button>
            `;
                document
                  .getElementById("send-reset-btn")
                  .addEventListener("click", (e) => {
                    e.target.textContent = "SENDING...";
                    auth
                      .sendPasswordResetEmail(restoredEmail)
                      .then(() => {
                        e.target.textContent = "LINK SENT!";
                        e.target.disabled = true;
                      })
                      .catch((err) => {
                        e.target.textContent = "ERROR. TRY LATER.";
                      });
                  });
              })
              .catch((error) => {
                titleEl.textContent = "ERROR ⚠️";
                statusEl.textContent =
                  "This recovery link is invalid or has expired.";
                statusEl.className = "auth-msg error-text";
              });
            break;

          default:
            titleEl.textContent = "HUH? 🧐";
            statusEl.textContent =
              "We don't recognize the action you are trying to perform.";
            statusEl.className = "auth-msg error-text";
        }
      }
    </script>
  </body>
</html>
